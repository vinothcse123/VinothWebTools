<!DOCTYPE html>
<html>
<head>
    <title>My App</title>
</head>
<body>

<h1>Call Python Backend</h1>
<button onclick="callAPI()">Get Response</button>

<p id="output"></p>

<script>
function callAPI() {
    fetch("https://your-app.onrender.com/api/hello")
        .then(response => response.json())
        .then(data => {
            document.getElementById("output").innerText = data.message;
        })
        .catch(err => console.error(err));
}
</script>

</body>
</html>
